description: >-
  Viacom was an American mass media conglomerate that merged with CBS Corporation
  in December 2019 to form ViacomCBS (later rebranded as Paramount Global).
  The combined entity, which included brands such as CBS, MTV, Nickelodeon,
  Comedy Central, BET, Paramount Pictures, Showtime, and Paramount+, was
  subsequently acquired by Skydance Media and ceased to exist as an independent
  public company in August 2025. Viacom maintained open source software through
  its GitHub organization (ViacomInc), including tools for Roku channel
  development, tvOS UI components, and broadcast calendar utilities. No public
  external developer API program was offered.
